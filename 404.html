<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Page Not Found — Japan Dev Guide</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://japandevguide.com/">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #F9F7F4; color: #1A2332; font-family: 'Outfit', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px 20px; }
  h1 { font-size: clamp(40px, 10vw, 96px); font-weight: 800; letter-spacing: -0.04em; margin: 0 0 12px; color: #C85A00; }
  h2 { font-size: clamp(18px, 3vw, 24px); font-weight: 600; margin: 0 0 16px; }
  p { font-size: 16px; color: #6b7484; max-width: 36em; margin: 0 auto 32px; line-height: 1.6; }
  a.btn { display: inline-block; background: #1A2332; color: #F9F7F4; text-decoration: none; padding: 12px 28px; border-radius: 2px; font-weight: 600; font-size: 15px; }

  /* ===== MOBILE NAV ===== */
  .nav-hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:#1A2332;line-height:0;flex-shrink:0;}
  .nav-overlay{display:none;position:fixed;inset:0;z-index:98;background:rgba(26,35,50,0.45);}
  .nav-mobile{display:none;position:fixed;top:0;right:0;bottom:0;z-index:99;width:min(280px,80vw);background:#F9F7F4;padding:28px 24px;flex-direction:column;box-shadow:-4px 0 24px rgba(26,35,50,0.18);}
  .nav-mobile-close{align-self:flex-end;background:none;border:none;cursor:pointer;font-size:22px;color:#1A2332;padding:4px;margin-bottom:36px;line-height:1;font-family:'Outfit',sans-serif;}
  .nav-mobile a{font-family:'Outfit',sans-serif;font-weight:500;font-size:18px;color:#1A2332;text-decoration:none;padding:16px 0;border-bottom:1px solid rgba(26,35,50,0.08);display:block;}
  .nav-mobile .nm-cta{margin-top:24px;background:#1A2332;color:#F9F7F4 !important;padding:14px 24px;text-align:center;border-radius:2px;font-weight:600;border-bottom:none;}
  body.nav-open .nav-overlay,body.nav-open .nav-mobile{display:flex;}
  @media(max-width:768px){.nav-hamburger{display:flex;align-items:center;}}
</style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>The page you're looking for has moved or no longer exists. Try the homepage or browse all articles.</p>
    <a class="btn" href="/">Back to homepage</a>
  </div>
<script>
(function(){var t=document.getElementById('navToggle'),o=document.getElementById('navOverlay'),c=document.getElementById('navClose');function op(){document.body.classList.add('nav-open');if(t)t.setAttribute('aria-expanded','true');}function cl(){document.body.classList.remove('nav-open');if(t)t.setAttribute('aria-expanded','false');}if(t)t.onclick=op;if(o)o.onclick=cl;if(c)c.onclick=cl;})();
</script>
</body>
</html>
